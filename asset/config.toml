# f4v, f4p, f4a, f4b, gif, mj2, nut,
#
# // audio
# mp3, wav, flac, aac, ogg, m4a, wma, ac3, alac, opus, amr, au,
#
# // image
# jpg, jpeg, png, bmp, tiff, tif, webp, exr